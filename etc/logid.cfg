// logiops (logid) config — Logitech MX Vertical button remap.
//
// The MX Vertical's top "DPI Switch" button (HID++ CID 0xFD) is firmware-trapped:
// it emits no evdev event, so it can't be bound in apps/games directly. logiops
// remaps it via the kernel uinput device, which (unlike Solaar's XTEST injection)
// reaches games that read raw input (e.g. WoW under Proton/XWayland).
//
// The `name` must match what logid detects — verify with:  journalctl -u logid -b
// (look for "Device found: <name>"). It differs from Solaar's reported name.

devices: (
{
    name: "MX Vertical Advanced Ergonomic Mouse";

    buttons: (
        {
            cid: 0xfd;                 // top cursor-speed / DPI button
            action = {
                type: "Keypress";
                keys: ["KEY_F12"];
            };
        }
    );
}
);
